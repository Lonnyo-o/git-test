<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录_注册 - 香哈网</title>
    <link rel="stylesheet" href="../css/log_in.css">
</head>
<body>
    <div class="layout titBox">
        <a href="../html/xm.html">
            <img src="../images/denglu/logo_entry.png" alt="title">
        </a>
    </div>
    <!-- 内容开始 -->
    <div class="layout conBox">
        <div class="tetxTit">欢迎回来,登录</div>
        <!-- 登录开始 -->
        <div class="icon">
            <div class="iconBox">
                <div class="L">
                    <div class="t1">
                        <span>QQ账号登录</span>
                    </div>
                </div>
                <div class="R">
                    <div class="t1 t2 ">
                        <span>新浪微博登录</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- 登录结束 -->
        <!-- 二维码开始 -->
        <div class="code"></div>
        <!-- 二维码结束 --> 
        <!-- 小字开始 -->
        <div class="small_character">
            打开<i class="wx"></i>微信扫一扫,<b>关注公众号</b>后即可登录/注册    
        </div>
        <!-- 小字结束 -->
        <!-- 小字2开始 -->
        <div class="small_character2"><a href="#">或用已有账号登录</a></div>
        <!-- 小字2结束 -->
        <!-- 注册开始 -->
        <form action="#" method="get">
            <input type="text" placeholder="手机号/邮箱">
            <input type="password" placeholder="密码" class="to">
            <div class="box3">
                <input type="checkbox" class="sz">
                <span>下次自动登录</span>
                <p>忘记密码了</p>
            </div>
            <input type="submit" value="登录" class="enter">
        </form>
        <!-- 注册结束 -->
    </div>
    <!-- 内容结束 -->
    <!-- 底部 -->
    <div class="layout but">没有香哈账号?<a href="../html/log_in.html">注册</a></div>
</body>
</html>

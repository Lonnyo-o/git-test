<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            height: 3000px;
            background-color: #ccc;
        }
        li{
            list-style: none;
        }
        .box{
            height: 365px;
            width: 82px;
            background-color: #fff;
            overflow: hidden;
            position: fixed;
            top: 50%;
            right: 12px;
            margin-top:-182px ;
        }
        .box>ul{
            width: 73px;
            height: 100%;
            /* background-color: red; */
            margin: 0 auto;
        }
        .box>ul>li{
            height: 68px;
            width:73px ;
            border-bottom: 1px #ccc solid;
            overflow: hidden;
            cursor: pointer;

        }
        .box>ul>.li1{
            height: 82px;
        }
        .box>ul>.cl{
            border: none;

        }
        .box>ul>li>.tu1{
            width: 22px;
            height: 25px;
            background:url(./images/yp-icons.20abdb4e.png) no-repeat -4px -1647px;
            /* background-size: 100% 100%; */
            /* background-color: yellow; */
            margin: 0 auto;
            margin-top: 12px;
        }
        .box>ul>li>.tu2{
            width: 22px;
            height: 25px;
            background:url(./images/yp-icons.20abdb4e.png) no-repeat -4px -1275px;
            /* background-size: 100% 100%; */
            /* background-color: yellow; */
           margin: 0 auto;
            margin-top: 12px;
        }
        .box>ul>li>.tu3{
            width: 25px;
            height: 24px;
            background:url(./images/yp-icons.20abdb4e.png) no-repeat -3px -798px;
            /* background-size: 100% 100%; */
            /* background-color: yellow; */
           margin: 0 auto;
            margin-top: 12px;
        }
        .box>ul>li>.tu4{
            width: 26px;
            height: 24px;
            background:url(./images/yp-icons.20abdb4e.png) no-repeat -1px -1002px;
            /* background-size: 100% 100%; */
            /* background-color: yellow; */
           margin: 0 auto;
            margin-top: 12px;
        }
        .box>ul>li>.tu5{
            width: 18px;
            height: 28px;
            background:url(./images/yp-icons.20abdb4e.png) no-repeat -7px -1305px;
            /* background-size: 100% 100%; */
            /* background-color: yellow; */
           margin: 0 auto;
            margin-top: 12px;
        }
        .box>ul>li>p{
            font-size: 12px;
            text-align: center;
            margin-top: 9px;
        }
        .box>ul>li>.xia{
            font-size: 12px;
            width: 25px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="box">
        <ul>
            <li>
                <div class="tu1"></div>
                <p>联系客服</p>
            </li>
            <li class="li1">
                <div class="tu2"></div>
                <p class="xia">下载APP</p>
            </li>
            <li>
                <div class="tu3"></div>
                <p>新人有礼</p>
            </li>
            <li>
                <div class="tu4"></div>
                <p>关注微信</p>
            </li>
            <li class="cl">
                <div class="tu5"></div>
                <p>返回顶部</p>
            </li>
        </ul>
    </div>
</body>
</html>
